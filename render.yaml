services:
  - type: web
    name: nexus-control-plane
    runtime: node
    plan: free
    rootDir: nexus
    buildCommand: ""
    startCommand: NEXUS_PROFILE=cloud NEXUS_HOST=0.0.0.0 node src/index.js
    healthCheckPath: /v1/health
    envVars:
      - key: NEXUS_PROFILE
        value: cloud
      - key: NEXUS_HOST
        value: 0.0.0.0
      - key: NEXUS_RECOVERY_TOKEN
        generateValue: true
      - key: NEXUS_API_KEY
        generateValue: true
    autoDeploy: true
