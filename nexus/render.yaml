services:
  - type: web
    name: nexus-control-plane
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ..
    plan: free
    healthCheckPath: /v1/health
    envVars:
      - key: NEXUS_PROFILE
        value: cloud
      - key: NEXUS_RECOVERY_TOKEN
        generateValue: true
    autoDeploy: true
